<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f8;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:#222;
    color:white;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

.nav-links{
    list-style:none;
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:white;
    font-size:16px;
    transition:0.3s;
}

.nav-links a:hover{
    color:#00c3ff;
}

#cartCount{
    background:red;
    padding:2px 8px;
    border-radius:50%;
    font-size:12px;
    margin-left:5px;
}

.header{
    text-align:center;
    padding:30px 10px;
}

.header h1{
    margin-bottom:8px;
}

.product-container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:25px;
    padding-bottom:40px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    height:180px;
    object-fit:contain;
    margin-bottom:10px;
}

.card h3{
    font-size:16px;
    height:45px;
    overflow:hidden;
}

.price{
    color:green;
    font-weight:bold;
    margin:10px 0;
    font-size:18px;
}

.add-cart{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

.add-cart:hover{
    background:#0056b3;
}

.loading{
    text-align:center;
    font-size:18px;
    padding:20px;
    display:none;
}

</style>
</head>

<body>

<nav class="navbar">
    <h2 class="logo">MyStore</h2>

    <ul class="nav-links">
        <li><a href="Project2.html">Home</a></li>
        <li>
            <a href="cart.html">
                My Shopping 🛒
            </a>
        </li>
    </ul>
</nav>

<header class="header">
    <h1>All Products</h1>
    <p>Select products and add them to cart</p>
</header>

<main>
    <div id="productContainer" class="product-container">

    </div>
</main>

<div id="loading" class="loading">
    Loading products...
</div>

<script src="Api.js"></script>
<script src="UI.js"></script>
<script src="App.js"></script>
<script src="Storage.js"></script>
</body>
</html>
